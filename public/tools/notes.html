<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />    <link rel="stylesheet" href="../assets/style/styleNotes.css">
    <title>Huble - Pomodoro</title>
</head>
<body>
    <header>
        <section class="headerContainer">
            <a href="/">
                <i class="fa-regular fa-house"></i>
            </a>

            <div class="divTheme">
                <i id="whiteTheme" class="fa-solid fa-moon" style="opacity: 0; transition: all 500ms ease-in-out;"></i>
                <i id="darkTheme" class="fa-regular fa-moon" style="opacity: 1; transition: all 500ms ease-in-out;"></i>
            </div>

            <h1>
                <i class="fa-solid fa-meteor"></i>
                HubBle
            </h1>
        </section>
    </header>

    <main>

        <div class="arc">
            <span>N</span>
            <span>O</span>
            <span>T</span>
            <span>E</span>
            <span>S</span>
        </div>

        <div class="search">
            <input type="text" placeholder="Search" style="display: none;">
            <i id="addNote" class="fa-solid fa-plus"></i>
            <i onclick="searchBtnInput()" class="fa-solid fa-magnifying-glass"></i>
            
        </div>

        
        <section id="workspace" class="workspace">
            <!-- Ideia consiste em uma area de trabalho onde pode Adicionar, organizar, arrastar, redimensionar e abrir notas -->
        </section>

        <section id="modal" class="modal" style="display: none;">
            <div class="modalContent">
                <div>
                    <textarea name="" id="newText" cols="30" rows="10"></textarea>
                </div>
                <button onclick="save()" id="save">save</button>
                <button onclick="exit()" id="exit">exit</button>
            </div>
        </section>


    </main>

    <footer>
        <p>Desenvolvido por Pedro Bispo</p>
        <p>2025</p>
        <p>Todos os direitos reservados©</p>
    </footer>


    <script type="module" src="../script/notes.js"></script>
</body>
