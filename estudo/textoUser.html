<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #note {
            background-color: beige;
            width: 100%;
            height: 200px;
            z-index: 0;
        }
        div p {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .modal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            background-color: rgba(0, 0, 0, 0.573);
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0px;
        }
    </style>
</head>
<body>


    <!-- Para testar e aprender o uso do usuário em alterações de texto na página -->
    <section id="note">
        <div>
            <p id="noteTittle">titulo</p>
        </div>
        <p id="noteText">Texto original</p>
        <button onclick="edit()"></button>
    </section>

    <section id="modal" class="modal" style="display: none;">
        <div class="modalContent">
            <div>
                <textarea name="" id="newText" cols="30" rows="10"></textarea>
            </div>
            <button onclick="save()" id="save">save</button>
            <button onclick="exit()" id="exit">exit</button>
        </div>
    </section>


    
    <script>
        const noteText = document.getElementById('noteText')
        function edit() {
            // modal
            document.getElementById('modal').style.display = "flex"
        }
        
        function exit() {
            document.getElementById('modal').style.display = "none"           
        }

        function save() {
            const newText = document.getElementById('newText').value

            noteText.innerHTML = newText

            document.getElementById('modal').style.display = "none"   
        }



    </script>
</body>
</html>
