<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../assets/style/stylePomodoro.css">
    <title>Huble - Pomodoro</title>
</head>
<body>
    <header>
        <section class="headerContainer">
            <a href="/">
                <i class="fa-regular fa-house"></i>
            </a>
            <h1>
                <i class="fa-solid fa-meteor"></i>
                HubBle
            </h1>
        </section>
    </header>

    <main>

        <section class="timerContainer">

            <div class="modes">
                <button>Short</button>
                <button>Pause</button>
                <button>Long</button>
            </div>

            <div class="timerDiv">
                <div class="timerCicle">
                    <span>04:00</span>
                </div>
            </div>

            <div class="buttonsTimer">
                <button>Start</button>
                <button>Pause</button>
                <button>Set</button>
            </div>

        </section>

    </main>

    <footer>
        <p>Desenvolvido por Pedro Bispo</p>
        <p>2025</p>
        <p>Todos os direitos reservados©</p>
    </footer>

</body>
</html>
