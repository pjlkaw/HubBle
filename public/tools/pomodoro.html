<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../assets/style/stylePomodoro.css">
    <title>Huble - Pomodoro</title>
</head>
<body>
    <header>
        <section class="headerContainer">
            <a href="/">
                <i class="fa-regular fa-house"></i>
            </a>

            <div class="divTheme">
                <i id="whiteTheme" class="fa-solid fa-moon" style="opacity: 0; transition: all 500ms ease-in-out;"></i>
                <i id="darkTheme" class="fa-regular fa-moon" style="opacity: 1; transition: all 500ms ease-in-out;"></i>
            </div>

            <h1>
                <i class="fa-solid fa-meteor"></i>
                HubBle
            </h1>
        </section>
    </header>

    <main>

        <div class="arc">
            <span>P</span>
            <span>O</span>
            <span>M</span>
            <span>O</span>
            <span>D</span>
            <span>O</span>
            <span>R</span>
            <span>O</span>
        </div>

        <section id="timerContainer" class="timerContainer">

            <div class="modes">
                <button id="shortID">Short</button>
                <button id="breakID">Break</button>
                <button id="longID">Long</button>
            </div>

            <div class="timerDiv">
                <span id="timerID">00:00:00</span>
            </div>

            <div class="buttonsTimer">
                <button id="startID">Start <i class="fa-solid fa-circle-play"></i></button>
                <button id="pauseID">Pause <i class="fa-solid fa-circle-pause"></i></button>

                <button id="setID">Set <i class="fa-solid fa-stopwatch"></i></button>
                <center>
                    <input id="setInput" type="text" placeholder="00:00:00" maxlength="10" style="display: none;">
                </center>
            </div>

        </section>

    </main>

    <footer>
        <p>Desenvolvido por Pedro Bispo</p>
        <p>2025</p>
        <p>Todos os direitos reservados©</p>
    </footer>


    <script type="module" src="../script/pomodoro.js"></script>
</body>
</html>
